version: '3.8'

services:
  fortenlog:
    build: .
    container_name: fortenlog_server
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=info
      - FORTENLOG_DATABASE_URL=/app/data/fortenlog.db
      - FORTENLOG_DOMAIN=${DOMAIN:-localhost}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/system/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


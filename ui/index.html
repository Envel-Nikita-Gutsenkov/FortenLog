<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues - FortenLog</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/views.css">
    <link rel="stylesheet" href="/css/fonts.css">
</head>
<body>
    <svg style="display: none;">
        <symbol id="icon-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></symbol>
        <symbol id="icon-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></symbol>
        <symbol id="icon-layout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></symbol>
        <symbol id="icon-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></symbol>
        <symbol id="icon-package" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.89 1.45l8 4.6a2 2 0 0 1 1 1.73v9.24a2 2 0 0 1-1 1.73l-8 4.6a2 2 0 0 1-2 0l-8-4.6a2 2 0 0 1-1-1.73V7.78a2 2 0 0 1 1-1.73l8-4.6a2 2 0 0 1 2 0z"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" y1="22" x2="12" y2="12"></line></symbol>
        <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></symbol>
        <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></symbol>
        <symbol id="icon-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></symbol>
        <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></symbol>
        <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="18.36" x2="5.64" y2="16.92"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></symbol>
        <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></symbol>
        <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></symbol>
        <symbol id="icon-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></symbol>
    </svg>

    <div class="layout" style="visibility: hidden; opacity: 0; transition: opacity 0.3s ease;">
        <div class="sidebar-primary">
            <div class="logo">F</div>
            <div class="nav-icon active" id="nav-issues" onclick="navigate('issues')" title="Issues"><svg><use href="#icon-layers"></use></svg></div>
            <div class="nav-icon" id="nav-analytics" onclick="navigate('analytics')" title="Analytics"><svg><use href="#icon-package"></use></svg></div>
            <div class="nav-icon" id="nav-uptime" onclick="navigate('uptime')" title="Uptime"><svg><use href="#icon-activity"></use></svg></div>
            <div class="nav-icon" id="nav-users" onclick="navigate('users')" title="Users"><svg><use href="#icon-users"></use></svg></div>
            <div class="nav-icon" id="nav-settings" onclick="navigate('settings')" title="Settings"><svg><use href="#icon-settings"></use></svg></div>
            <div style="margin-top: auto; padding-bottom: 32px; display: flex; flex-direction: column; align-items: center; gap: 24px;">
                <div class="nav-icon" onclick="import('/js/auth.js').then(m => m.auth.logout())" title="Logout System" style="color: var(--error); opacity: 0.8;"><svg><use href="#icon-logout"></use></svg></div>
                <div onclick="navigate('security_profile')" style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #fff; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 4px 12px rgba(108, 92, 231, 0.4);">NN</div>
            </div>
        </div>

        <div class="sidebar-secondary">
            <div class="sub-nav-section">
                <div class="sub-nav-header">Analytics</div>
                <div class="sub-nav-item active" id="subnav-issues" onclick="navigate('issues')">Issues <span id="issue-count-badge" class="badge">...</span></div>
                <div class="sub-nav-item" id="subnav-analytics" onclick="navigate('analytics')">Overview Dashboard</div>
                <div class="sub-nav-item" id="subnav-explore" onclick="navigate('explore')">Event Explorer</div>
                <div class="sub-nav-item" id="subnav-dashboard-builder" onclick="navigate('dashboard_builder')">Custom Dashboards</div>
            </div>

            <div class="sub-nav-section">
                <div class="sub-nav-header">Management</div>
                <div class="sub-nav-item" id="subnav-projects" onclick="navigate('projects')">Project Registry</div>
                <div class="sub-nav-item" id="subnav-storage" onclick="navigate('storage')">Storage & Backups</div>
                <div class="sub-nav-item" id="subnav-users" onclick="navigate('users')">User Registry</div>
            </div>
            
            <div class="sub-nav-section">
                <div class="sub-nav-header">Infrastructure</div>
                <div class="sub-nav-item" id="subnav-uptime" onclick="navigate('uptime')">Uptime Monitors</div>
                <div class="sub-nav-item" id="subnav-audit" onclick="navigate('audit')">Global Audit Log</div>
                <div class="sub-nav-item" id="subnav-docs" onclick="navigate('docs')">Documentation</div>
                <div class="sub-nav-item" id="subnav-settings" onclick="navigate('settings')">Server Settings</div>
                <div class="sub-nav-item" id="subnav-performance" onclick="navigate('performance')">System Diagnostics</div>
                <div class="sub-nav-item" id="subnav-api_keys" onclick="navigate('api_keys')">API Keys</div>
            </div>

            <div class="sub-nav-section" id="sidebar-saved-views-section" style="display: none; border-top: 1px solid var(--border); margin-top: 15px; padding-top: 15px;">
                <div class="sub-nav-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span>Saved Views</span>
                </div>
                <div id="sidebar-saved-views-list" style="display: flex; flex-direction: column; gap: 4px;">
                    <!-- Dynamically rendered custom saved view links -->
                </div>
            </div>
        </div>

        <div class="main">
            <div class="header" style="height: 64px; padding: 0 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: var(--header-bg); position: sticky; top: 0; z-index: 100;">
                <div class="breadcrumb" id="breadcrumb-text" style="font-size: 14px; font-weight: 800; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; max-width: 50vw;">Issues <span style="color: var(--text-secondary); margin: 0 12px; font-weight: 300;">»</span> Feed</div>
                <div style="margin-left: 20px;">
                    <div class="custom-select" id="project-dropdown">
                        <div class="select-trigger" id="project-trigger">
                            <span id="selected-project-name">All Projects</span>
                            <svg style="width: 10px; height: 10px; margin-left: 6px; opacity: 0.5;"><use href="#icon-chevron-down"></use></svg>
                        </div>
                        <div class="select-options" id="project-options">
                            <!-- Options injected by app.js -->
                        </div>
                    </div>
                </div>
                <div style="margin-left: auto; display: flex; gap: 10px; align-items: center;">
                    <button class="btn" id="header-export-btn" onclick="exportData()" title="Export Data"><svg style="width: 14px; height: 14px;"><use href="#icon-download"></use></svg></button>
                    <button class="btn" onclick="refreshData()"><svg style="width: 14px; height: 14px;"><use href="#icon-refresh"></use></svg></button>
                    <button class="btn" onclick="toggleTheme()"><svg id="theme-icon" style="width: 14px; height: 14px;"><use href="#icon-moon"></use></svg></button>
                    <button class="btn btn-primary" id="btn-save-view-global">Save View</button>
                </div>
            </div>

            <div id="view-content">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/qrcode.min.js"></script>
    <script src="/js/chart.js"></script>
    <script type="module" src="/js/app.js"></script>
    <!-- Global Modal Infrastructure -->
    <div id="modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div id="modal-content" class="modal-content">
            <!-- Dynamic content injected by app.js -->
        </div>
    </div>
</body>
</html>
